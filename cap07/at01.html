<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 07 — AT01 — Cartão de Apresentação</title>
  <style>
    /* Regras do Elemento Body */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #eaeaea;
      text-align: center;
      padding: 3rem var(--espaco-md, 1rem);
    }

    header {
      margin-bottom: 2rem;
    }

    header p a {
      color: #0066cc;
      text-decoration: none;
    }

    header p a:hover {
      text-decoration: underline;
    }

    /* Bloco do Cartão de Apresentação */
    .cartao {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    /* Nome Completo */
    .cartao-nome {
      font-size: 2.25rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    /* Linha Divisória Personalizada */
    hr, .cartao-divisor {
      border: 0;
      border-top: 2px dashed #0066cc;
      margin: 1.25rem auto;
      width: 60%;
    }

    /* Cargo ou Função */
    .cartao-cargo {
      font-style: italic;
      color: #555555;
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    /* E-mail de Contato */
    .cartao-email {
      font-size: 0.9rem;
      color: #0066cc;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <h1>AT01 — Cartão de Apresentação</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>
    <article class="cartao">
      <h1 class="cartao-nome">Vitória Cestari Duarte</h1>
      <hr class="cartao-divisor" />
      <p class="cartao-cargo">Estudante de Sistemas de Informação — IFAL</p>
      <p class="cartao-email">vcds1@aluno.ifal.edu.br</p>
    </article>
  </main>

</body>
</html>
