<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 07 — AT01 — Cartão de Apresentação</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      text-align: center;
      padding: 50px;
    }

    .cartao {
      background-color: #ffffff;
      max-width: 400px;
      margin: 0 auto;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .cartao-nome {
      font-size: 2.5rem;
      color: #1a73e8;
      margin-bottom: 0.5rem;
    }

    .cartao-divisor {
      border: 0;
      border-top: 2px dashed #aecbfa;
      margin: 1.5rem 0;
    }

    .cartao-cargo {
      font-style: italic;
      color: #5f6368;
      font-weight: 500;
    }

    .cartao-email {
      font-size: 0.9rem;
      color: #70757a;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cartão de Apresentação</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>
    <article class="cartao">
      <h1 class="cartao-nome">Vitória Cestari Duarte</h1>
      <hr class="cartao-divisor" />
      <p class="cartao-cargo">Estudante de Sistemas de Informação — IFAL</p>
      <p class="cartao-email">vcds1@aluno.ifal.edu.br</p>
    </article>
  </main>
</body>
</html>
