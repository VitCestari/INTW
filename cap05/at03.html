<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>
  <header>
    <h1>Solicitação de Matrícula</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>
  <main>
    <p><i>* Campos obrigatórios</i></p>
    <form action="https://httpbin.org/post" method="POST">
      
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome completo *: </label>
        <input type="text" id="nome" name="nome" required minlength="5" maxlength="100"><br><br>

        <label for="cpf">CPF *: </label>
        <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00"><br><br>

        <label for="tel">Telefone: </label>
        <input type="tel" id="tel" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999"><br><br>

        <label for="email">E-mail *: </label>
        <input type="email" id="email" name="email" required>
      </fieldset>

      <fieldset>
        <legend>Dados Acadêmicos</legend>
        <label for="curso">Curso *: </label>
        <select id="curso" name="curso" required>
          <option value="">Selecione um curso...</option>
          <optgroup label="Computação">
            <option value="si">Sistemas de Informação</option>
            <option value="cc">Ciência da Computação</option>
            <option value="ec">Engenharia da Computação</option>
          </optgroup>
          <optgroup label="Gestão">
            <option value="adm">Administração</option>
            <option value="cont">Ciências Contábeis</option>
          </optgroup>
        </select><br><br>

        <fieldset>
          <legend>Período *</legend>
          <input type="radio" id="m" name="periodo" value="Manhã" required> <label for="m">Manhã</label>
          <input type="radio" id="t" name="periodo" value="Tarde"> <label for="t">Tarde</label>
          <input type="radio" id="n" name="periodo" value="Noite"> <label for="n">Noite</label>
        </fieldset><br>

        <label for="ano">Ano de ingresso pretendido *: </label>
        <input type="number" id="ano" name="ano_ingresso" min="2025" max="2030" required>
      </fieldset>

      <fieldset>
        <legend>Áreas de Interesse</legend>
        <input type="checkbox" id="web" name="interesses[]" value="DevWeb"> <label for="web">Desenvolvimento Web</label><br>
        <input type="checkbox" id="bd" name="interesses[]" value="BD"> <label for="bd">Banco de Dados</label><br>
        <input type="checkbox" id="ia" name="interesses[]" value="IA"> <label for="ia">Inteligência Artificial</label><br>
        <input type="checkbox" id="sec" name="interesses[]" value="SegInfo"> <label for="sec">Segurança da Informação</label><br>
        <input type="checkbox" id="infra" name="interesses[]" value="Infra"> <label for="infra">Infraestrutura</label>
      </fieldset>

      <br>
      <button type="submit">Solicitar matrícula</button>
      <button type="reset">Limpar formulário</button>
    </form>
  </main>
</body>
</html>
