<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>
  <header>
    <h1>Semana de Tecnologia IFAL</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>
  <main>
    <form action="https://httpbin.org/post" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="edicao" value="2026" />

      <fieldset>
        <legend>Identificação do Participante</legend>
        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">E-mail institucional:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="cidade">Cidade de origem:</label>
        <input type="text" id="cidade" name="cidade" list="cidades-list">
        <datalist id="cidades-list">
          <option value="Maceió">
          <option value="Arapiraca">
          <option value="Palmeira dos Índios">
          <option value="Rio Largo">
          <option value="Penedo">
          <option value="União dos Palmares">
          <option value="Delmiro Gouveia">
          <option value="Santana do Ipanema">
        </datalist><br><br>

        <label for="foto">Foto para crachá:</label>
        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="desc-foto">
        <small id="desc-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
      </fieldset>

      <fieldset>
        <legend>Preferências para o Evento</legend>
        <label for="chegada">Data e hora preferida para chegada:</label>
        <input type="datetime-local" id="chegada" name="chegada"><br><br>

        <label for="experiencia">
          Nível de experiência: <span id="valor-experiencia">5</span>/10
        </label>
        <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" oninput="document.getElementById('valor-experiencia').textContent = this.value"><br><br>

        <label for="cor">Cor de preferência para a camiseta:</label>
        <input type="color" id="cor" name="cor_camiseta" value="#1a73e8"><br><br>

        <label for="oficinas">Oficinas de interesse:</label><br>
        <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="desc-oficinas">
          <option value="html">HTML5 Avançado</option>
          <option value="css">CSS Grid e Flexbox</option>
          <option value="js">JavaScript Moderno</option>
          <option value="react">Introdução ao React</option>
          <option value="git">Git e GitHub</option>
        </select><br>
        <small id="desc-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
      </fieldset>

      <br>
      <button type="submit">Confirmar inscrição</button>
    </form>
  </main>
</body>
</html>
